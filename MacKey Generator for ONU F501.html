<body>
    <div class="container">

            <!-- Генератор -->

                <div class="input-group">

                <div class="commands-title">КОМАНДЫ</div>

    <div id="toast" class="toast">Скопировано!</div>

    <script>
        // ==================================================================
        // ТОЧНАЯ РЕАЛИЗАЦИЯ SHA1 ИЗ ПРОШИВКИ (JavaScript)
        // ==================================================================
        function rotl(n, x) {
            return ((x << n) | (x >>> (32 - n))) >>> 0;
        }

        function ft(t, b, c, d) {
            if (t < 20) return (b & c) | ((~b) & d);
            if (t < 40) return b ^ c ^ d;
            if (t < 60) return (b & c) | (b & d) | (c & d);
            return b ^ c ^ d;
        }

        function k(t) {
            if (t < 20) return 0x5A827999;
            if (t < 40) return 0x6ED9EBA1;
            if (t < 60) return 0x8F1BBCDC;
            return 0xCA62C1D6;
        }

        function sha1Firmware(data) {
            let ml = data.length * 8;
            
            let paddedList = [];
            for (let i = 0; i < data.length; i++) paddedList.push(data[i]);
            paddedList.push(0x80);
            
            while ((paddedList.length + 4) % 64 !== 0) {
                paddedList.push(0x00);
            }
            
            paddedList.push((ml >>> 24) & 0xFF);
            paddedList.push((ml >>> 16) & 0xFF);
            paddedList.push((ml >>> 8) & 0xFF);
            paddedList.push(ml & 0xFF);
            
            let padded = new Uint8Array(paddedList);
            
            let h0 = 0x67452301;
            let h1 = 0x10325476;
            let h2 = 0x98BADCFE;
            let h3 = 0xC3D2E1F0;
            let h4 = 0xEFCDAB89;
            
            for (let i = 0; i < padded.length; i += 64) {
                let block = padded.slice(i, i + 64);
                let w = new Array(80).fill(0);
                
                for (let t = 0; t < 16; t++) {
                    w[t] = (block[t*4] << 24) | (block[t*4+1] << 16) | (block[t*4+2] << 8) | block[t*4+3];
                }
                
                for (let t = 16; t < 80; t++) {
                    w[t] = rotl(1, w[t-3] ^ w[t-8] ^ w[t-14] ^ w[t-16]);
                }
                
                let a = h0, b = h1, c = h2, d = h3, e = h4;
                
                for (let t = 0; t < 80; t++) {
                    let f = ft(t, b, c, d);
                    let temp = (rotl(5, a) + f + e + k(t) + w[t]) >>> 0;
                    e = d;
                    d = c;
                    c = rotl(30, b);
                    b = a;
                    a = temp;
                }
                
                h0 = (h0 + a) >>> 0;
                h1 = (h1 + b) >>> 0;
                h2 = (h2 + c) >>> 0;
                h3 = (h3 + d) >>> 0;
                h4 = (h4 + e) >>> 0;
            }
            
            let result = new Uint8Array(20);
            result[0] = (h0 >>> 24) & 0xFF;
            result[1] = (h0 >>> 16) & 0xFF;
            result[2] = (h0 >>> 8) & 0xFF;
            result[3] = h0 & 0xFF;
            result[4] = (h1 >>> 24) & 0xFF;
            result[5] = (h1 >>> 16) & 0xFF;
            result[6] = (h1 >>> 8) & 0xFF;
            result[7] = h1 & 0xFF;
            result[8] = (h2 >>> 24) & 0xFF;
            result[9] = (h2 >>> 16) & 0xFF;
            result[10] = (h2 >>> 8) & 0xFF;
            result[11] = h2 & 0xFF;
            result[12] = (h3 >>> 24) & 0xFF;
            result[13] = (h3 >>> 16) & 0xFF;
            result[14] = (h3 >>> 8) & 0xFF;
            result[15] = h3 & 0xFF;
            result[16] = (h4 >>> 24) & 0xFF;
            result[17] = (h4 >>> 16) & 0xFF;
            result[18] = (h4 >>> 8) & 0xFF;
            result[19] = h4 & 0xFF;
            
            return result;
        }
        
        function hmacSha1Firmware(key, data) {
            const blockSize = 64;
            let keyBytes = new Uint8Array(key);
            
            if (keyBytes.length > blockSize) {
                keyBytes = sha1Firmware(keyBytes);
            }
            
            if (keyBytes.length < blockSize) {
                let newKey = new Uint8Array(blockSize);
                newKey.set(keyBytes);
                keyBytes = newKey;
            }
            
            const oKeyPad = new Uint8Array(blockSize);
            const iKeyPad = new Uint8Array(blockSize);
            
            for (let i = 0; i < blockSize; i++) {
                oKeyPad[i] = keyBytes[i] ^ 0x5C;
                iKeyPad[i] = keyBytes[i] ^ 0x36;
            }
            
            const innerData = new Uint8Array(iKeyPad.length + data.length);
            innerData.set(iKeyPad);
            innerData.set(data, iKeyPad.length);
            const innerHash = sha1Firmware(innerData);
            
            const outerData = new Uint8Array(oKeyPad.length + innerHash.length);
            outerData.set(oKeyPad);
            outerData.set(innerHash, oKeyPad.length);
            const outerHash = sha1Firmware(outerData);
            
            return outerHash;
        }
        
        function computeMackey(macStr) {
            let macClean = macStr.replace(/[:-\s]/g, '');
            if (macClean.length !== 12) {
                throw new Error('Неверный формат MAC. Ожидается 6 групп по 2 hex-цифры.');
            }
            
            const macBytes = new Uint8Array(6);
            for (let i = 0; i < 6; i++) {
                macBytes[i] = parseInt(macClean.substr(i * 2, 2), 16);
            }
            
            const constBytes = new Uint8Array([0x35, 0x6B, 0x8B, 0xD3]);
            const param1Bytes = new Uint8Array([0x04, 0x00, 0x01, 0x01]);
            
            const key = new Uint8Array(24);
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 6; j++) {
                    key[i * 6 + j] = constBytes[i] ^ param1Bytes[i] ^ macBytes[j];
                }
            }
            
            const hmacResult = hmacSha1Firmware(key, macBytes);
            const mackeyBytes = hmacResult.slice(0, 16);
            
            let hex = '';
            for (let i = 0; i < mackeyBytes.length; i++) {
                hex += mackeyBytes[i].toString(16).padStart(2, '0');
            }
            
            return hex;
        }
        
        function formatMacForDisplay(macHex) {
            let parts = [];
            for (let i = 0; i < 12; i += 2) {
                parts.push(macHex.substr(i, 2));
            }
            return parts.join(':');
        }
        
        // ==================================================================
        // UI ЛОГИКА
        // ==================================================================
        const macInput = document.getElementById('macInput');
        const generateBtn = document.getElementById('generateBtn');
        const resultBlock = document.getElementById('resultBlock');
        const mackeyValue = document.getElementById('mackeyValue');
        const displayMac = document.getElementById('displayMac');
        const cmdOui = document.getElementById('cmdOui');
        const cmdMac = document.getElementById('cmdMac');
        const cmdKey = document.getElementById('cmdKey');
        const copyAllBtn = document.getElementById('copyAllBtn');
        const toast = document.getElementById('toast');
        
        function showToast(message) {
            toast.textContent = message || 'Скопировано!';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        function updateCommands(macClean, mackey) {
            const oui = macClean.substr(0, 6);
            const fullMac = macClean;
            
            cmdOui.innerHTML = `<span>OUI</span> ${oui}`;
            cmdMac.innerHTML = `<span>MAC</span> ${fullMac}`;
            cmdKey.innerHTML = `<span>MAC_KEY</span> ${mackey}`;
        }
        
        function generate() {
            let macRaw = macInput.value.trim();
            if (!macRaw) {
                alert('Введите MAC-адрес');
                return;
            }
            
            try {
                let macClean = macRaw.replace(/[:-\s]/g, '');
                if (macClean.length !== 12) {
                    throw new Error('MAC должен содержать 12 hex-символов');
                }
                
                if (!/^[0-9A-Fa-f]{12}$/.test(macClean)) {
                    throw new Error('MAC содержит недопустимые символы');
                }
                
                const mackey = computeMackey(macRaw);
                
                const formattedMac = formatMacForDisplay(macClean.toUpperCase());
                displayMac.textContent = formattedMac;
                mackeyValue.textContent = mackey;
                resultBlock.style.display = 'block';
                
                updateCommands(macClean.toLowerCase(), mackey);
                
                resultBlock.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }
        
        function copyAllCommands() {
            const ouiText = cmdOui.innerText;
            const macText = cmdMac.innerText;
            const keyText = cmdKey.innerText;
            const commands = `${ouiText}\n${macText}\n${keyText}`;
            
            navigator.clipboard.writeText(commands).then(() => {
                showToast('Все данные скопированы!');
            }).catch(() => {
                alert('Не удалось скопировать');
            });
        }
        
        generateBtn.addEventListener('click', generate);
        copyAllBtn.addEventListener('click', copyAllCommands);
        
        generate();
        
        macInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generate();
            }
        });
        
        macInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^0-9A-Fa-f]/g, '').toUpperCase();
            if (value.length > 12) value = value.substr(0, 12);
            
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 2 === 0 && i < 12) {
                    formatted += ':';
                }
                formatted += value[i];
            }
            e.target.value = formatted;
        });
    </script>
